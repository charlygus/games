<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Reflex Game">
    
    <link rel="apple-touch-icon" href="icon.png">

    <title>Atrapa el Círculo</title>
    <style>
        /* Bloqueo estricto de selección de texto y gestos nativos */
        * {
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            /* touch-action: none evita el pull-to-refresh y el pinch-to-zoom */
            touch-action: none; 
        }
        
        .screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: absolute;
            top: 0;
            left: 0;
            text-align: center;
            padding: 20px;
        }
        .active {
            display: flex;
        }

        /* --- Pantalla 1: Inicio --- */
        #start-screen h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            font-weight: 800;
        }
        #secret-trigger {
            color: #666;
            font-size: 1.2rem;
            margin-bottom: 50px;
            padding: 20px;
            cursor: pointer;
            transition: color 0.3s;
            font-weight: bold;
        }
        .btn {
            background-color: #007aff;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 15px 50px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 122, 255, 0.4);
            margin-bottom: 15px;
            width: 80%;
            max-width: 300px;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .btn-secondary {
            background-color: #333;
            box-shadow: none;
            font-size: 1.2rem;
            padding: 12px 40px;
        }

        /* --- Pantalla 2: Juego --- */
        #level-display {
            position: absolute;
            top: env(safe-area-inset-top, 30px);
            margin-top: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffd700;
            pointer-events: none;
        }
        #score-display {
            position: absolute;
            top: env(safe-area-inset-top, 70px);
            margin-top: 50px;
            font-size: 4rem;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.2);
            pointer-events: none;
        }
        #start-hint {
            position: absolute;
            top: 30%;
            font-size: 1.2rem;
            color: #fff;
            pointer-events: none;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }
        #target {
            width: 70px;
            height: 70px;
            background-color: #ff3b30;
            border-radius: 50%;
            position: absolute;
            box-shadow: 0 0 15px rgba(255, 59, 48, 0.6);
            cursor: pointer;
            touch-action: none; 
        }

        /* --- Pantalla 3: Game Over --- */
        #game-over-screen {
            opacity: 1;
            transition: opacity 1s ease-in-out;
        }
        #game-over-screen h2 {
            font-size: 2.8rem;
            color: #ff3b30;
            margin-bottom: 10px;
        }
        #game-over-score {
            font-size: 1.5rem;
            color: #aaa;
            margin-bottom: 40px;
        }

        /* --- Pantalla 4: Sorpresa Elegante --- */
        #surprise-screen {
            background-color: #050505;
            z-index: 10;
            opacity: 0; 
            transition: opacity 2s ease-in-out;
        }
        
        #surprise-screen.visible {
            opacity: 1; 
        }

        .surprise-card {
            background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
            padding: 40px 30px;
            border-radius: 20px;
            border: 1px solid #333;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), 0 0 20px rgba(255, 215, 0, 0.05);
            transform: translateY(20px);
            transition: transform 2s ease-out;
            width: 90%;
            max-width: 400px;
        }

        #surprise-screen.visible .surprise-card {
            transform: translateY(0); 
        }

        .surprise-img {
            width: 100%;
            max-width: 280px; 
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.8);
            display: block;
            margin-left: auto;
            margin-right: auto;
            border: 1px solid rgba(255, 215, 0, 0.2); 
        }

        .elegant-title {
            font-size: 1.8rem;
            color: #fff;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 20px;
            line-height: 1.3;
        }

        .elegant-title strong {
            font-size: 2.4rem;
            color: #ffd700; 
            font-weight: 800;
            display: block;
            margin-top: 5px;
        }

        .elegant-subtitle {
            font-size: 1.2rem;
            color: #ccc;
            margin-bottom: 15px;
            font-weight: normal;
        }

        .elegant-date {
            font-size: 1rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 3px;
            border-top: 1px solid #333;
            padding-top: 15px;
            margin-top: 15px;
        }

        /* Confeti */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            animation: fall linear forwards;
            z-index: 5;
            border-radius: 2px;
        }
        @keyframes fall {
            to { transform: translateY(110vh) rotate(720deg); }
        }
    </style>
</head>
