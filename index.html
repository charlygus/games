<body>
    <audio id="birthday-song" src="cancion.mp3" preload="auto"></audio>
    <div id="start-screen" class="screen active">
        <h1>Atrapa el<br>Círculo</h1>
        <div id="secret-trigger">Récord actual: 30</div>
        <button id="play-btn" class="btn">JUGAR</button>
    </div>
    <div id="game-screen" class="screen">
        <div id="level-display">Nivel: Sencillo</div>
        <div id="score-display">0</div>
        <div id="start-hint">Toca el orbe para empezar</div>
        <div id="target"></div>
    </div>
    <div id="game-over-screen" class="screen">
        <h2>¡Game Over!</h2>
        <div id="game-over-score">Puntuación: 0</div>
        <button id="retry-btn" class="btn">Reintentar</button>
        <button id="menu-btn" class="btn btn-secondary">Menú</button>
    </div>
    
    <div id="glitch-screen" class="screen">
        <h2>ERROR 404:<br>SYSTEM OVERRIDE</h2>
    </div>

    <div id="surprise-screen" class="screen"></div>
