<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Reflex Game">
    <link rel="apple-touch-icon" href="icon.png">

    <title>Atrapa el Círculo</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            touch-action: manipulation;
        }
        
        .screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: absolute;
            top: 0;
            left: 0;
            text-align: center;
            padding: 20px;
        }
        .active {
            display: flex;
        }

        /* --- Pantalla 1: Inicio --- */
        #start-screen h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            font-weight: 800;
        }
        #secret-trigger {
            color: #666;
            font-size: 1.2rem;
            margin-bottom: 50px;
            padding: 20px;
            cursor: pointer;
            transition: color 0.3s;
            font-weight: bold;
        }
        .btn {
            background-color: #007aff;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 15px 50px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 122, 255, 0.4);
            margin-bottom: 15px;
            width: 80%;
            max-width: 300px;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .btn-secondary {
            background-color: #333;
            box-shadow: none;
            font-size: 1.2rem;
            padding: 12px 40px;
        }

        /* --- Pantalla 2: Juego --- */
        #level-display {
            position: absolute;
            top: 30px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffd700;
            pointer-events: none;
        }
        #score-display {
            position: absolute;
            top: 70px;
            font-size: 4rem;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.2);
            pointer-events: none;
        }
        #start-hint {
            position: absolute;
            top: 25%;
            font-size: 1.2rem;
            color: #fff;
            pointer-events: none;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }
        #target {
            width: 70px;
            height: 70px;
            background-color: #ff3b30;
            border-radius: 50%;
            position: absolute;
            box-shadow: 0 0 15px rgba(255, 59, 48, 0.6);
            cursor: pointer;
            /* Evita el zoom accidental al tocar rápido en móviles */
            touch-action: none; 
        }

        /* --- Pantalla 3: Game Over --- */
        #game-over-screen h2 {
            font-size: 2.8rem;
            color: #ff3b30;
            margin-bottom: 10px;
        }
        #game-over-score {
            font-size: 1.5rem;
            color: #aaa;
            margin-bottom: 40px;
        }

        /* --- Pantalla 4: Sorpresa (Neón) --- */
        #surprise-screen {
            background-color: #050505;
            z-index: 10;
        }
        .neon-title {
            font-size: 3.2rem;
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            line-height: 1.2;
            margin-bottom: 30px;
            text-shadow:
                0 0 5px #fff,
                0 0 10px #fff,
                0 0 20px #ff00de,
                0 0 40px #ff00de,
                0 0 80px #ff00de;
            animation: neon-pulse 1.5s infinite alternate;
        }
        .neon-subtitle {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.6);
        }
        .neon-date {
            font-size: 1.4rem;
            color: #00ffff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.6);
        }
        @keyframes neon-pulse {
            from { text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px #ff00de, 0 0 40px #ff00de; }
            to { text-shadow: 0 0 2px #fff, 0 0 5px #fff, 0 0 10px #ff00de, 0 0 20px #ff00de; }
        }

        /* Confeti */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            animation: fall linear forwards;
            z-index: 5;
        }
        @keyframes fall {
            to { transform: translateY(110vh) rotate(720deg); }
        }
    </style>
</head>
<body>

    <audio id="birthday-song" src="cancion.mp3" preload="auto"></audio>

    <div id="start-screen" class="screen active">
        <h1>Atrapa el<br>Círculo</h1>
        <div id="secret-trigger">Récord actual: 12</div>
        <button id="play-btn" class="btn">JUGAR</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="level-display">Nivel: Sencillo</div>
        <div id="score-display">0</div>
        <div id="start-hint">Toca el círculo para empezar</div>
        <div id="target"></div>
    </div>

    <div id="game-over-screen" class="screen">
        <h2>¡Tiempo Agotado!</h2>
        <div id="game-over-score">Puntuación: 0</div>
        <button id="retry-btn" class="btn">Reintentar</button>
        <button id="menu-btn" class="btn btn-secondary">Volver al Menú</button>
    </div>

    <div id="surprise-screen" class="screen">
        <div class="neon-title">NOS VAMOS<br>DE CONCIERTO</div>
        <div class="neon-subtitle">Gira ‘Ya es Mañana Tour’<br>de Morat.</div>
        <div class="neon-date">Valencia, 23 de Octubre.</div>
    </div>

    <script>
        // Variables
        let score = 0;
        let isSurpriseMode = false;
        let isGameActive = false;
        let targetTimeout;
        let audioUnlocked = false;

        // Elementos DOM
        const startScreen = document.getElementById('start-screen');
        const gameScreen = document.getElementById('game-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const surpriseScreen = document.getElementById('surprise-screen');
        const target = document.getElementById('target');
        const scoreDisplay = document.getElementById('score-display');
        const levelDisplay = document.getElementById('level-display');
        const finalScoreDisplay = document.getElementById('game-over-score');
        const playBtn = document.getElementById('play-btn');
        const retryBtn = document.getElementById('retry-btn');
        const menuBtn = document.getElementById('menu-btn');
        const secretTrigger = document.getElementById('secret-trigger');
        const song = document.getElementById('birthday-song');
        const startHint = document.getElementById('start-hint');

        // BOTÓN TRUCO: Activa/Desactiva el modo y se pone Rojo
        secretTrigger.addEventListener('click', () => {
            isSurpriseMode = !isSurpriseMode;
            secretTrigger.style.color = isSurpriseMode ? "#ff3b30" : "#666";
        });

        // BOTONES DE MENÚ
        playBtn.addEventListener('click', initGameReadyState);
        retryBtn.addEventListener('click', initGameReadyState);
        
        menuBtn.addEventListener('click', () => {
            gameOverScreen.classList.remove('active');
            startScreen.classList.add('active');
        });

        // Preparar la partida
        function initGameReadyState() {
            song.pause();
            song.currentTime = 0;
            
            score = 0;
            scoreDisplay.textContent = score;
            levelDisplay.textContent = "Nivel: Sencillo";
            levelDisplay.style.color = "#ffd700";
            isGameActive = false;
            
            startHint.style.display = 'block';
            
            startScreen.classList.remove('active');
            gameOverScreen.classList.remove('active');
            surpriseScreen.classList.remove('active');
            gameScreen.classList.add('active');
            
            target.style.left = 'calc(50% - 35px)';
            target.style.top = 'calc(50% - 35px)';
        }

        function spawnTarget() {
            clearTimeout(targetTimeout);

            // Evitar bordes y textos
            const safeMarginX = 80; 
            const safeMarginY = 120;
            const maxX = window.innerWidth - safeMarginX;
            const maxY = window.innerHeight - safeMarginY;

            const randomX = Math.floor(Math.random() * (maxX - 20)) + 10;
            const randomY = Math.floor(Math.random() * (maxY - 100)) + 100; 

            target.style.left = randomX + 'px';
            target.style.top = randomY + 'px';

            // LÓGICA DE NIVELES Y VELOCIDAD
            let speed = 1500; // Por defecto Sencillo

            if (score <= 7) {
                levelDisplay.textContent = "Nivel: Sencillo";
                levelDisplay.style.color = "#00ff00";
                speed = 1500;
            } else if (score <= 15) {
                levelDisplay.textContent = "Nivel: Medio";
                levelDisplay.style.color = "#ffd700";
                speed = 1300;
            } else if (score <= 24) {
                levelDisplay.textContent = "Nivel: Extremo";
                levelDisplay.style.color = "#ff8c00";
                speed = 1100;
            } else {
                levelDisplay.textContent = "Nivel: Imposible";
                levelDisplay.style.color = "#ff3b30";
                // Si la trampa está activa y llegamos al 25, la velocidad es 0.3s
                if (isSurpriseMode) {
                    speed = 300;
                } else {
                    speed = 900; // Por si tú juegas en modo normal y pasas del 25
                }
            }

            targetTimeout = setTimeout(handleTimeout, speed);
        }

        // Interacción con el círculo (Cubre ratón y táctil)
        target.addEventListener('mousedown', (e) => { e.preventDefault(); handleTap(); });
        target.addEventListener('touchstart', (e) => { e.preventDefault(); handleTap(); });

        function handleTap() {
            // Primer toque: Arranca tiempo y desbloquea el canal de audio para iOS
            if (!isGameActive) {
                isGameActive = true;
                startHint.style.display = 'none';
                
                if (!audioUnlocked) {
                    song.play().then(() => {
                        song.pause();
                        song.currentTime = 0;
                        audioUnlocked = true;
                    }).catch(() => {});
                }

                score = 1;
                scoreDisplay.textContent = score;
                spawnTarget();
                return;
            }

            score++;
            scoreDisplay.textContent = score;

            // DETONANTE: Toca el círculo 25 y armamos el audio para la sorpresa
            if (isSurpriseMode && score === 25) {
                song.volume = 1.0;
                song.play().catch(e => console.log("Audio bloqueado", e));
            }

            spawnTarget();
        }

        function handleTimeout() {
            isGameActive = false;
            
            // Si la trampa está armada y perdió en el círculo rápido (25 puntos logrados)
            if (isSurpriseMode && score >= 25) {
                triggerSurprise();
            } else {
                showGameOver();
            }
        }

        function showGameOver() {
            gameScreen.classList.remove('active');
            finalScoreDisplay.textContent = "Puntuación: " + score;
            gameOverScreen.classList.add('active');
        }

        function triggerSurprise() {
            gameScreen.classList.remove('active');
            surpriseScreen.classList.add('active');
            
            // Por si el audio falló al tocar el 25, forzamos un segundo intento de Play
            if (song.paused) {
                song.volume = 1.0;
                song.play().catch(e => console.log("Audio falló", e));
            }
            
            launchConfetti();
        }

        function launchConfetti() {
            const colors = ['#FFC700', '#FF0000', '#2E3192', '#41BBC7', '#00FF00', '#ff00de'];
            for (let i = 0; i < 120; i++) {
                let confeti = document.createElement('div');
                confeti.classList.add('confetti');
                confeti.style.left = Math.random() * 100 + 'vw';
                confeti.style.top = -20 + 'px';
                confeti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                let size = Math.random() * 8 + 6;
                confeti.style.width = size + 'px';
                confeti.style.height = size + 'px';
                confeti.style.animationDuration = (Math.random() * 3 + 2) + 's';
                confeti.style.animationDelay = (Math.random() * 1) + 's';
                
                document.body.appendChild(confeti);
            }
        }
    </script>
</body>
</html>
