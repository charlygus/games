<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Reflex Game">
    <link rel="apple-touch-icon" href="icon.png">

    <title>Atrapa el Círculo</title>
    <style>
        /* Bloqueo estricto de selección de texto y gestos nativos */
        * {
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            /* touch-action: none evita el pull-to-refresh y el pinch-to-zoom */
            touch-action: none; 
        }
        
        .screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: absolute;
            top: 0;
            left: 0;
            text-align: center;
            padding: 20px;
        }
        .active {
            display: flex;
        }

        /* --- Pantalla 1: Inicio --- */
        #start-screen h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            font-weight: 800;
        }
        #secret-trigger {
            color: #666;
            font-size: 1.2rem;
            margin-bottom: 50px;
            padding: 20px;
            cursor: pointer;
            transition: color 0.3s;
            font-weight: bold;
        }
        .btn {
            background-color: #007aff;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 15px 50px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 122, 255, 0.4);
            margin-bottom: 15px;
            width: 80%;
            max-width: 300px;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .btn-secondary {
            background-color: #333;
            box-shadow: none;
            font-size: 1.2rem;
            padding: 12px 40px;
        }

        /* --- Pantalla 2: Juego --- */
        #level-display {
            position: absolute;
            top: env(safe-area-inset-top, 30px);
            margin-top: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffd700;
            pointer-events: none;
        }
        #score-display {
            position: absolute;
            top: env(safe-area-inset-top, 70px);
            margin-top: 50px;
            font-size: 4rem;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.2);
            pointer-events: none;
        }
        #start-hint {
            position: absolute;
            top: 30%;
            font-size: 1.2rem;
            color: #fff;
            pointer-events: none;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }
        #target {
            width: 70px;
            height: 70px;
            background-color: #ff3b30;
            border-radius: 50%;
            position: absolute;
            box-shadow: 0 0 15px rgba(255, 59, 48, 0.6);
            cursor: pointer;
            touch-action: none; 
        }

        /* --- Pantalla 3: Game Over --- */
        #game-over-screen {
            opacity: 1;
            transition: opacity 1s ease-in-out;
        }
        #game-over-screen h2 {
            font-size: 2.8rem;
            color: #ff3b30;
            margin-bottom: 10px;
        }
        #game-over-score {
            font-size: 1.5rem;
            color: #aaa;
            margin-bottom: 40px;
        }

        /* --- Pantalla 4: Sorpresa Elegante --- */
        #surprise-screen {
            background-color: #050505;
            z-index: 10;
            opacity: 0; 
            transition: opacity 2s ease-in-out;
        }
        
        #surprise-screen.visible {
            opacity: 1; 
        }

        .surprise-card {
            background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
            padding: 40px 30px;
            border-radius: 20px;
            border: 1px solid #333;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), 0 0 20px rgba(255, 215, 0, 0.05);
            transform: translateY(20px);
            transition: transform 2s ease-out;
            width: 90%;
            max-width: 400px;
        }

        #surprise-screen.visible .surprise-card {
            transform: translateY(0); 
        }

        .surprise-img {
            width: 100%;
            max-width: 280px; 
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.8);
            display: block;
            margin-left: auto;
            margin-right: auto;
            border: 1px solid rgba(255, 215, 0, 0.2); 
        }

        .elegant-title {
            font-size: 1.8rem;
            color: #fff;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 20px;
            line-height: 1.3;
        }

        .elegant-title strong {
            font-size: 2.4rem;
            color: #ffd700; 
            font-weight: 800;
            display: block;
            margin-top: 5px;
        }

        .elegant-subtitle {
            font-size: 1.2rem;
            color: #ccc;
            margin-bottom: 15px;
            font-weight: normal;
        }

        .elegant-date {
            font-size: 1rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 3px;
            border-top: 1px solid #333;
            padding-top: 15px;
            margin-top: 15px;
        }

        /* Confeti */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            animation: fall linear forwards;
            z-index: 5;
            border-radius: 2px;
        }
        @keyframes fall {
            to { transform: translateY(110vh) rotate(720deg); }
        }
    </style>
</head>
<body>

    <audio id="birthday-song" src="cancion.mp3" preload="auto"></audio>

    <div id="start-screen" class="screen active">
        <h1>Atrapa el<br>Círculo</h1>
        <div id="secret-trigger">Récord actual: 12</div>
        <button id="play-btn" class="btn">JUGAR</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="level-display">Nivel: Sencillo</div>
        <div id="score-display">0</div>
        <div id="start-hint">Toca el círculo para empezar</div>
        <div id="target"></div>
    </div>

    <div id="game-over-screen" class="screen">
        <h2>¡Tiempo Agotado!</h2>
        <div id="game-over-score">Puntuación: 0</div>
        <button id="retry-btn" class="btn">Reintentar</button>
        <button id="menu-btn" class="btn btn-secondary">Volver al Menú</button>
    </div>

    <div id="surprise-screen" class="screen">
        <div class="surprise-card">
            <img src="https://raw.githubusercontent.com/charlygus/games/main/imagen.webp" alt="Cartel Morat" class="surprise-img">
            <div class="elegant-title">PREPÁRATE,<br>NOS VAMOS DE <strong>CONCIERTO</strong></div>
            <div class="elegant-subtitle">Gira ‘Ya es Mañana Tour’ de Morat</div>
            <div class="elegant-date">Valencia | 23 de Octubre</div>
        </div>
    </div>

    <script>
        // Variables
        let score = 0;
        let isSurpriseMode = false;
        let isGameActive = false;
        let targetTimeout;
        let audioUnlocked = false;
        let isTransitioning = false; 

        // Elementos DOM
        const startScreen = document.getElementById('start-screen');
        const gameScreen = document.getElementById('game-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const surpriseScreen = document.getElementById('surprise-screen');
        const target = document.getElementById('target');
        const scoreDisplay = document.getElementById('score-display');
        const levelDisplay = document.getElementById('level-display');
        const finalScoreDisplay = document.getElementById('game-over-score');
        const playBtn = document.getElementById('play-btn');
        const retryBtn = document.getElementById('retry-btn');
        const menuBtn = document.getElementById('menu-btn');
        const secretTrigger = document.getElementById('secret-trigger');
        const song = document.getElementById('birthday-song');
        const startHint = document.getElementById('start-hint');

        // BOTÓN TRUCO: Activa/Desactiva el modo y se pone Rojo
        secretTrigger.addEventListener('click', () => {
            isSurpriseMode = !isSurpriseMode;
            secretTrigger.style.color = isSurpriseMode ? "#ff3b30" : "#666";
        });

        // BOTONES DE MENÚ
        playBtn.addEventListener('click', initGameReadyState);
        retryBtn.addEventListener('click', () => {
            if(!isTransitioning) initGameReadyState();
        });
        
        menuBtn.addEventListener('click', () => {
            if(!isTransitioning) {
                gameOverScreen.classList.remove('active');
                startScreen.classList.add('active');
            }
        });

        // Preparar la partida (Reseteo profundo)
        function initGameReadyState() {
            clearTimeout(targetTimeout);
            isTransitioning = false;
            
            song.pause();
            song.currentTime = 0;
            
            score = 0;
            scoreDisplay.textContent = score;
            levelDisplay.textContent = "Nivel: Sencillo";
            levelDisplay.style.color = "#ffd700";
            isGameActive = false;
            
            startHint.style.display = 'block';
            
            startScreen.classList.remove('active');
            gameOverScreen.classList.remove('active');
            surpriseScreen.classList.remove('active');
            surpriseScreen.classList.remove('visible'); 
            gameOverScreen.style.opacity = '1'; 
            gameScreen.classList.add('active');
            
            // Centramos el círculo inicialmente
            target.style.left = 'calc(50% - 35px)';
            target.style.top = 'calc(50% - 35px)';
        }

        function spawnTarget() {
            clearTimeout(targetTimeout);

            // CÁLCULO SEGURO DE MÁRGENES (Evita la isla dinámica y bordes)
            const targetSize = 70;
            const safeMarginTop = 160; 
            const safeMarginBottom = 60; 
            const safeMarginX = 20; 

            const maxX = window.innerWidth - targetSize - safeMarginX;
            const maxY = window.innerHeight - targetSize - safeMarginBottom;

            const randomX = Math.max(safeMarginX, Math.floor(Math.random() * maxX));
            const randomY = Math.max(safeMarginTop, Math.floor(Math.random() * maxY));

            target.style.left = randomX + 'px';
            target.style.top = randomY + 'px';

            // LÓGICA DE NIVELES Y VELOCIDAD
            let speed = 1500; 

            if (score <= 7) {
                levelDisplay.textContent = "Nivel: Sencillo";
                levelDisplay.style.color = "#00ff00";
                speed = 1500;
            } else if (score <= 15) {
                levelDisplay.textContent = "Nivel: Medio";
                levelDisplay.style.color = "#ffd700";
                speed = 1300;
            } else if (score <= 24) {
                levelDisplay.textContent = "Nivel: Extremo";
                levelDisplay.style.color = "#ff8c00";
                speed = 1100;
            } else {
                levelDisplay.textContent = "Nivel: Imposible";
                levelDisplay.style.color = "#ff3b30";
                
                if (isSurpriseMode) {
                    speed = 200; 
                } else {
                    speed = 900; 
                }
            }

            targetTimeout = setTimeout(handleTimeout, speed);
        }

        target.addEventListener('pointerdown', (e) => { 
            e.preventDefault(); 
            e.stopPropagation(); 
            handleTap(); 
        });

        function handleTap() {
            if (!isGameActive) {
                isGameActive = true;
                startHint.style.display = 'none';
                
                // BLINDAJE DE AUDIO iOS: Usamos mute para que el desbloqueo sea 100% silencioso
                if (!audioUnlocked) {
                    song.muted = true; 
                    song.play().then(() => {
                        song.pause();
                        song.currentTime = 0;
                        audioUnlocked = true;
                    }).catch(() => {});
                }

                score = 1;
                scoreDisplay.textContent = score;
                spawnTarget();
                return;
            }

            score++;
            scoreDisplay.textContent = score;
            spawnTarget();
        }

        function handleTimeout() {
            isGameActive = false;
            
            if (isSurpriseMode && score >= 25) {
                triggerSurprise();
            } else {
                showGameOver();
            }
        }

        function showGameOver() {
            gameScreen.classList.remove('active');
            finalScoreDisplay.textContent = "Puntuación: " + score;
            gameOverScreen.style.opacity = '1';
            gameOverScreen.classList.add('active');
        }

        function triggerSurprise() {
            isTransitioning = true; 
            
            gameScreen.classList.remove('active');
            finalScoreDisplay.textContent = "Puntuación: " + score;
            gameOverScreen.style.opacity = '1';
            gameOverScreen.classList.add('active');

            setTimeout(() => {
                gameOverScreen.style.opacity = '0';
                
                setTimeout(() => {
                    gameOverScreen.classList.remove('active');
                    surpriseScreen.classList.add('active');
                    
                    setTimeout(() => {
                        surpriseScreen.classList.add('visible');
                        
                        // DEVOLVEMOS EL SONIDO: Quitamos el mute para que suene la sorpresa
                        song.muted = false; 
                        song.volume = 1.0; 
                        song.play().catch(e => console.log("El audio falló:", e));
                        
                        launchConfetti();
                    }, 50);
                    
                }, 1000); 
                
            }, 2500); 
        }

        function launchConfetti() {
            const colors = ['#FFD700', '#FFFFFF', '#DAA520', '#E0E0E0', '#CD7F32', '#222222'];
            
            for (let i = 0; i < 120; i++) {
                let confeti = document.createElement('div');
                confeti.classList.add('confetti');
                confeti.style.left = Math.random() * 100 + 'vw';
                confeti.style.top = -20 + 'px';
                confeti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                let size = Math.random() * 8 + 6;
                confeti.style.width = size + 'px';
                confeti.style.height = size + 'px';
                confeti.style.animationDuration = (Math.random() * 3 + 2) + 's';
                confeti.style.animationDelay = (Math.random() * 1) + 's';
                
                document.body.appendChild(confeti);

                setTimeout(() => {
                    confeti.remove();
                }, 6000); 
            }
        }
    </script>
</body>
</html>
