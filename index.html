<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Reflex Game">
    
    <link rel="apple-touch-icon" href="icon.png">

    <title>Atrapa el Círculo</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            touch-action: manipulation;
        }
        
        .screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: absolute;
            top: 0;
            left: 0;
        }
        .active {
            display: flex;
        }

        /* --- Pantalla 1: Inicio --- */
        #start-screen h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-align: center;
        }
        #secret-trigger {
            color: #666;
            font-size: 1.2rem;
            margin-bottom: 50px;
            padding: 15px;
            cursor: pointer;
        }
        #play-btn {
            background-color: #007aff;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 15px 50px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
        }

        /* --- Pantalla 2: Juego --- */
        #score-display {
            position: absolute;
            top: 60px;
            font-size: 3rem;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.3);
            pointer-events: none;
        }
        
        /* Mensaje de espera antes de empezar */
        #start-hint {
            position: absolute;
            top: 30%;
            font-size: 1.2rem;
            color: #ffd700;
            text-align: center;
            pointer-events: none;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        #target {
            width: 70px;
            height: 70px;
            background-color: #ff3b30;
            border-radius: 50%;
            position: absolute;
            box-shadow: 0 0 15px rgba(255, 59, 48, 0.6);
            transition: transform 0.1s;
            cursor: pointer;
        }
        #target:active {
            transform: scale(0.8);
        }

        /* --- Pantalla 3: Sorpresa --- */
        #surprise-screen {
            background-color: #000;
            z-index: 10;
            text-align: center;
            padding: 20px;
        }
        #surprise-screen img {
            max-width: 90%;
            max-height: 45vh;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(255,255,255,0.2);
            object-fit: cover;
        }
        #surprise-screen h2 {
            font-size: 2.2rem;
            color: #ffd700;
            margin-bottom: 10px;
        }
        #surprise-screen p {
            font-size: 1.2rem;
            line-height: 1.5;
            color: #eee;
        }

        /* Confeti CSS */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            animation: fall linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(110vh) rotate(720deg); }
        }
    </style>
</head>
<body>

    <audio id="birthday-song" src="cancion.mp3" preload="auto"></audio>

    <div id="start-screen" class="screen active">
        <h1>Atrapa el<br>Círculo</h1>
        
        <div id="secret-trigger">Récord actual: 12</div>
        
        <button id="play-btn">JUGAR</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="score-display">0</div>
        <div id="start-hint">Toca el círculo para empezar</div>
        <div id="target"></div>
    </div>

    <div id="surprise-screen" class="screen">
        <img src="entradas.jpg" alt="Regalo de cumpleaños">
        <h2>¡RÉCORD SUPERADO!</h2>
        <p>Prepara las maletas que nos vamos de concierto. <br><br><b>¡Feliz Cumpleaños!</b></p>
    </div>

    <script>
        // Variables de estado
        let score = 0;
        let isSurpriseMode = false;
        let isGameActive = false; // Nueva variable para controlar la pausa inicial
        let targetTimeout;

        // Elementos del DOM
        const startScreen = document.getElementById('start-screen');
        const gameScreen = document.getElementById('game-screen');
        const surpriseScreen = document.getElementById('surprise-screen');
        const target = document.getElementById('target');
        const scoreDisplay = document.getElementById('score-display');
        const playBtn = document.getElementById('play-btn');
        const secretTrigger = document.getElementById('secret-trigger');
        const song = document.getElementById('birthday-song');
        const startHint = document.getElementById('start-hint');

        // Partida normal (Juegas tú)
        playBtn.addEventListener('click', () => {
            isSurpriseMode = false;
            initGameReadyState();
        });

        // Partida trucada (Juega ella)
        secretTrigger.addEventListener('click', () => {
            isSurpriseMode = true;
            secretTrigger.style.color = "white";
            setTimeout(() => {
                secretTrigger.style.color = "#666";
                initGameReadyState();
            }, 150);
        });

        // Prepara el tablero pero NO arranca el tiempo aún
        function initGameReadyState() {
            song.pause();
            song.currentTime = 0;
            
            score = 0;
            scoreDisplay.textContent = score;
            isGameActive = false;
            
            // Mostrar texto de ayuda
            startHint.style.display = 'block';
            
            startScreen.classList.remove('active');
            gameScreen.classList.add('active');
            
            // Colocar el círculo en el centro de la pantalla
            target.style.left = 'calc(50% - 35px)';
            target.style.top = 'calc(50% - 35px)';
        }

        // Arranca el movimiento y el temporizador
        function spawnTarget() {
            clearTimeout(targetTimeout);

            const safeMargin = 80; 
            const maxX = window.innerWidth - safeMargin;
            const maxY = window.innerHeight - safeMargin;

            const randomX = Math.floor(Math.random() * (maxX - 20)) + 10;
            const randomY = Math.floor(Math.random() * (maxY - 100)) + 90; 

            target.style.left = randomX + 'px';
            target.style.top = randomY + 'px';

            targetTimeout = setTimeout(() => {
                endGame();
            }, 1200); // 1.2 segundos para atrapar el círculo
        }

        // Eventos de interacción
        target.addEventListener('mousedown', (e) => { e.preventDefault(); handleTap(); });
        target.addEventListener('touchstart', (e) => { e.preventDefault(); handleTap(); });

        function handleTap() {
            // Si el juego estaba pausado esperando el primer toque, arranca ahora
            if (!isGameActive) {
                isGameActive = true;
                startHint.style.display = 'none'; // Ocultar el texto
                score = 1;
                scoreDisplay.textContent = score;
                spawnTarget();
                return;
            }

            score++;
            scoreDisplay.textContent = score;
            
            // Lógica de sorpresa en el toque 10
            if (isSurpriseMode && score >= 10) {
                clearTimeout(targetTimeout);
                song.play(); // El audio arranca gracias al toque físico
                triggerSurprise();
            } else {
                spawnTarget();
            }
        }

        function endGame() {
            clearTimeout(targetTimeout);
            isGameActive = false;
            gameScreen.classList.remove('active');
            startScreen.classList.add('active');
        }

        function triggerSurprise() {
            gameScreen.classList.remove('active');
            surpriseScreen.classList.add('active');
            launchConfetti();
        }

        function launchConfetti() {
            const colors = ['#FFC700', '#FF0000', '#2E3192', '#41BBC7', '#00FF00'];
            for (let i = 0; i < 80; i++) {
                let confeti = document.createElement('div');
                confeti.classList.add('confetti');
                confeti.style.left = Math.random() * 100 + 'vw';
                confeti.style.top = -20 + 'px';
                confeti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                let size = Math.random() * 8 + 6;
                confeti.style.width = size + 'px';
                confeti.style.height = size + 'px';
                confeti.style.animationDuration = (Math.random() * 3 + 2) + 's';
                confeti.style.animationDelay = (Math.random() * 1) + 's';
                
                document.body.appendChild(confeti);
            }
        }
    </script>
</body>
</html>
