<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Reflex Game">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/charlygus/games/main/icon.png">
    <title>Atrapa el Círculo</title>
    <style>

    </style>
</head>
<body>
    <audio id="birthday-song" src="cancion.mp3" preload="auto"></audio>
    <div id="start-screen" class="screen active">
        <h1>Atrapa el<br>Círculo</h1>
        <div id="secret-trigger">Récord actual: 12</div>
        <button id="play-btn" class="btn">JUGAR</button>
    </div>
    <div id="game-screen" class="screen">
        <div id="level-display">Nivel: Sencillo</div>
        <div id="score-display">0</div>
        <div id="start-hint">Toca el círculo para empezar</div>
        <div id="target"></div>
    </div>
    <div id="game-over-screen" class="screen">
        <h2>¡Tiempo Agotado!</h2>
        <div id="game-over-score">Puntuación: 0</div>
        <button id="retry-btn" class="btn">Reintentar</button>
        <button id="menu-btn" class="btn btn-secondary">Volver al Menú</button>
    </div>
    <div id="surprise-screen" class="screen">
        <div class="surprise-card">
            <img src="https://raw.githubusercontent.com/charlygus/games/main/imagen.webp" alt="Cartel Morat" class="surprise-img">
            <div class="elegant-title">PREPÁRATE,<br>NOS VAMOS DE <strong>CONCIERTO</strong></div>
            <div class="elegant-subtitle">Gira ‘Ya es Mañana Tour’ de Morat</div>
            <div class="elegant-date">Valencia | 23 de Octubre</div>
        </div>
    </div>
    <script>
        document.addEventListener("contextmenu",e=>e.preventDefault()),document.addEventListener("keydown",e=>{"F12"!==e.key&&!(e.ctrlKey&&e.shiftKey&&"I"===e.key)&&!(e.ctrlKey&&"u"===e.key)&&!(e.metaKey&&e.altKey&&"i"===e.key)&&!(e.metaKey&&"u"===e.key)||e.preventDefault()}),setInterval(()=>{debugger},100);let score=0,isSurpriseMode=!1,isGameActive=!1,targetTimeout,audioUnlocked=!1,isTransitioning=!1;const startScreen=document.getElementById("start-screen"),gameScreen=document.getElementById("game-screen"),gameOverScreen=document.getElementById("game-over-screen"),surpriseScreen=document.getElementById("surprise-screen"),target=document.getElementById("target"),scoreDisplay=document.getElementById("score-display"),levelDisplay=document.getElementById("level-display"),finalScoreDisplay=document.getElementById("game-over-score"),playBtn=document.getElementById("play-btn"),retryBtn=document.getElementById("retry-btn"),menuBtn=document.getElementById("menu-btn"),secretTrigger=document.getElementById("secret-trigger"),song=document.getElementById("birthday-song"),startHint=document.getElementById("start-hint");secretTrigger.addEventListener("click",()=>{isSurpriseMode=!isSurpriseMode,secretTrigger.style.color=isSurpriseMode?"#ff3b30":"#666"}),playBtn.addEventListener("click",initGameReadyState),retryBtn.addEventListener("click",()=>{isTransitioning||initGameReadyState()}),menuBtn.addEventListener("click",()=>{isTransitioning||(gameOverScreen.classList.remove("active"),startScreen.classList.add("active"))});function initGameReadyState(){clearTimeout(targetTimeout),isTransitioning=!1,song.pause(),song.currentTime=0,score=0,scoreDisplay.textContent=score,levelDisplay.textContent="Nivel: Sencillo",levelDisplay.style.color="#ffd700",isGameActive=!1,startHint.style.display="block",startScreen.classList.remove("active"),gameOverScreen.classList.remove("active"),surpriseScreen.classList.remove("active"),surpriseScreen.classList.remove("visible"),gameOverScreen.style.opacity="1",gameScreen.classList.add("active"),target.style.left="calc(50% - 35px)",target.style.top="calc(50% - 35px)"}function spawnTarget(){clearTimeout(targetTimeout);const e=70,t=160,s=60,c=20,i=window.innerWidth-e-c,n=window.innerHeight-e-s,o=Math.max(c,Math.floor(Math.random()*i)),r=Math.max(t,Math.floor(Math.random()*n));target.style.left=o+"px",target.style.top=r+"px";let l=1500;score<=7?(levelDisplay.textContent="Nivel: Sencillo",levelDisplay.style.color="#00ff00",l=1500):score<=15?(levelDisplay.textContent="Nivel: Medio",levelDisplay.style.color="#ffd700",l=1300):score<=24?(levelDisplay.textContent="Nivel: Extremo",levelDisplay.style.color="#ff8c00",l=1100):(levelDisplay.textContent="Nivel: Imposible",levelDisplay.style.color="#ff3b30",l=isSurpriseMode?200:900),targetTimeout=setTimeout(handleTimeout,l)}target.addEventListener("pointerdown",e=>{e.preventDefault(),e.stopPropagation(),handleTap()});function handleTap(){if(!isGameActive)return isGameActive=!0,startHint.style.display="none",audioUnlocked||(song.muted=!0,song.play().then(()=>{song.pause(),song.currentTime=0,audioUnlocked=!0}).catch(()=>{})),score=1,scoreDisplay.textContent=score,void spawnTarget();score++,scoreDisplay.textContent=score,spawnTarget()}function handleTimeout(){isGameActive=!1,isSurpriseMode&&score>=25?triggerSurprise():showGameOver()}function showGameOver(){gameScreen.classList.remove("active"),finalScoreDisplay.textContent="Puntuación: "+score,gameOverScreen.style.opacity="1",gameOverScreen.classList.add("active")}function triggerSurprise(){isTransitioning=!0,gameScreen.classList.remove("active"),finalScoreDisplay.textContent="Puntuación: "+score,gameOverScreen.style.opacity="1",gameOverScreen.classList.add("active"),setTimeout(()=>{gameOverScreen.style.opacity="0",setTimeout(()=>{gameOverScreen.classList.remove("active"),surpriseScreen.classList.add("active"),setTimeout(()=>{surpriseScreen.classList.add("visible"),song.muted=!1,song.volume=1,song.play().catch(e=>console.log("El audio falló:",e)),launchConfetti()},50)},1e3)},2500)}function launchConfetti(){const e=["#FFD700","#FFFFFF","#DAA520","#E0E0E0","#CD7F32","#222222"];for(let t=0;t<120;t++){let s=document.createElement("div");s.classList.add("confetti"),s.style.left=100*Math.random()+"vw",s.style.top="-20px",s.style.backgroundColor=e[Math.floor(Math.random()*e.length)];let c=8*Math.random()+6;s.style.width=c+"px",s.style.height=c+"px",s.style.animationDuration=3*Math.random()+2+"s",s.style.animationDelay=1*Math.random()+"s",document.body.appendChild(s),setTimeout(()=>{s.remove()},6e3)}}
    </script>
</body>
</html>
