<!DOCTYPE html>

    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/charlygus/games/main/icon.png">
    <title>Atrapa el Círculo Neo-Arcade</title>
    <style>
        *{box-sizing:border-box;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;-webkit-tap-highlight-color:transparent}body{margin:0;padding:0;background-color:#020210;color:#0ff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;overflow:hidden;width:100vw;height:100vh;touch-action:none;background:radial-gradient(circle at center, #0a0a2a 0%, #020210 100%)}.screen{display:none;width:100%;height:100%;flex-direction:column;justify-content:center;align-items:center;position:absolute;top:0;left:0;text-align:center;padding:20px;opacity:0;transition:opacity .5s ease-in-out}.active{display:flex;opacity:1}#start-screen h1{font-size:3.5rem;margin-bottom:10px;font-weight:900;letter-spacing:-2px;color:#f0f;text-shadow:0 0 10px #f0f,0 0 20px #f0f;animation:neonFlicker 2s infinite alternate}@keyframes neonFlicker{0%,100%{opacity:1;text-shadow:0 0 10px #f0f,0 0 20px #f0f}50%{opacity:.8;text-shadow:0 0 5px #f0f}}#secret-trigger{color:rgba(0,255,255,.6);font-size:1.2rem;margin-bottom:50px;padding:20px;cursor:pointer;transition:color .3s;font-weight:700;text-shadow:0 0 5px rgba(0,255,255,.3)}.btn{background:linear-gradient(45deg,#f0f,#ff007f);color:#fff;border:1px solid #0ff;border-radius:10px;padding:18px 50px;font-size:1.6rem;font-weight:900;cursor:pointer;box-shadow:0 0 15px rgba(255,0,255,.5),inset 0 0 5px rgba(0,255,255,.5);margin-bottom:15px;width:80%;max-width:300px;text-transform:uppercase;letter-spacing:1px;transition:all .1s ease}.btn:active{transform:scale(.95) translateY(2px);background:linear-gradient(45deg,#ff007f,#f0f);box-shadow:0 0 5px rgba(255,0,255,.3)}.btn-secondary{background:linear-gradient(45deg,#2a1a5a,#1a1a3a);color:#0ff;border-color:#2a1a5a;box-shadow:0 0 10px rgba(42,26,90,.4)}#level-display{position:absolute;top:env(safe-area-inset-top,30px);margin-top:20px;font-size:1.6rem;font-weight:900;color:#0ff;text-shadow:0 0 5px #0ff;pointer-events:none;text-transform:uppercase;transition:opacity .5s ease}#score-display{position:absolute;top:env(safe-area-inset-top,70px);margin-top:50px;font-size:5.5rem;font-weight:900;color:rgba(0,255,255,.1);pointer-events:none;transition:opacity .5s ease}#start-hint{position:absolute;top:30%;font-size:1.3rem;color:#f0f;font-weight:700;pointer-events:none;text-shadow:0 0 10px #f0f;animation:pulse 1.5s infinite}@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
        
        #target{width:70px;height:70px;background-color:#ff3b30;border-radius:50%;position:absolute;box-shadow:0 0 25px #ff3b30,0 0 50px rgba(255,59,48,.5),inset 0 0 15px #fff;cursor:pointer;touch-action:none;transition:all .1s ease}

        #target.heart-mode {
